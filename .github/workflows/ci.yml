name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-and-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r langchain-agent/requirements.txt
          python -m pip install -r langchain-agent/requirements-dev.txt

      - name: Run unit tests
        working-directory: langchain-agent
        env:
          PYTHONPATH: .
        run: |
          python -m pytest -q

      - name: Start backend for regression
        working-directory: langchain-agent
        env:
          PYTHONPATH: .
          OPENAI_API_KEY: ci-dummy-key
          OPENAI_BASE_URL: http://127.0.0.1:9
          OPENAI_MODEL: ci-dummy-model
          RUN_RETRY_ATTEMPTS: "0"
          REQUEST_TIMEOUT_SECONDS: "8"
          REQUEST_TIMEOUT_SECONDS_STREAM: "8"
          DEGRADE_ON_ERROR: "true"
          DEGRADE_ON_TIMEOUT: "true"
          APP_AUTH_ENABLED: "false"
        run: |
          nohup python -m uvicorn backend.main:app --host 127.0.0.1 --port 8000 > ../backend_ci.log 2>&1 &
          echo $! > ../backend_ci.pid

      - name: Run bad case regression
        working-directory: langchain-agent
        run: |
          python scripts/run_badcase_regression.py \
            --base-url http://127.0.0.1:8000 \
            --output docs/bad_case_results.json \
            --ready-timeout 60 \
            --request-timeout 15

      - name: Evaluate bad case regression gate
        working-directory: langchain-agent
        run: |
          python scripts/eval_badcase.py \
            --input docs/bad_case_results.json \
            --min-pass-rate 0.90 \
            --max-avg-latency-ms 30000 \
            --require-status 200 \
            --require-expected false

      - name: Upload regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-artifacts
          path: |
            langchain-agent/docs/bad_case_results.json
            backend_ci.log

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend_ci.pid ]; then
            kill $(cat backend_ci.pid) || true
          fi
